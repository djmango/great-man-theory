<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Story gallery · Great Man Theory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    color-scheme:light dark;
    --paper:#f5f2eb; --paper-dark:#ebe7dc;
    --ink:#1a1a1a; --ink-light:#6b6b6b;
    --line:rgba(26,26,26,.14);
    --sans:"Inter",system-ui,sans-serif;
    --mono:"JetBrains Mono",ui-monospace,monospace;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --paper:#211e18; --paper-dark:#2b261e;
      --ink:#f3eadb; --ink-light:#b9aa96;
      --line:rgba(243,234,219,.19);
    }
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; min-height:100dvh; background:var(--paper); color:var(--ink);
    font-family:var(--sans); font-size:15px; line-height:1.5;
  }
  .wrap{ max-width:1440px; margin:0 auto; padding:24px 20px 56px; }
  .top{
    display:flex; flex-wrap:wrap; align-items:flex-end; justify-content:space-between;
    gap:16px 24px; padding-bottom:18px; border-bottom:1px solid var(--line);
  }
  .brand b{
    display:block; font-family:var(--mono); font-size:10px; letter-spacing:.28em;
    text-transform:uppercase; color:var(--ink-light); font-weight:500;
  }
  .brand h1{
    margin:6px 0 0; font-size:clamp(1.35rem,2.5vw,1.9rem); font-weight:300; letter-spacing:-.02em;
  }
  .back{
    font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--ink-light); text-decoration:none;
  }
  .back:hover{ color:var(--ink); }
  .toolbar{
    display:flex; flex-wrap:wrap; align-items:center; gap:12px 18px;
    margin:18px 0 22px;
  }
  .stats{
    font-family:var(--mono); font-size:10px; letter-spacing:.12em;
    text-transform:uppercase; color:var(--ink-light);
  }
  .search{
    flex:1 1 220px; min-width:180px; max-width:360px;
    border:0; border-bottom:1px solid var(--line); background:transparent;
    color:var(--ink); font:inherit; padding:8px 0;
  }
  .search:focus{ outline:1px solid var(--ink); outline-offset:3px; }
  .chips{ display:flex; flex-wrap:wrap; gap:7px; width:100%; }
  .chip{
    font-family:var(--mono); font-size:9px; letter-spacing:.1em; text-transform:uppercase;
    cursor:pointer; padding:5px 10px; border:1px solid var(--ink); color:var(--ink);
    background:transparent;
  }
  .chip[aria-pressed="true"]{ background:var(--ink); color:var(--paper); }
  .grid{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:18px;
  }
  .card{
    border:1px solid var(--line); background:var(--paper-dark);
    display:flex; flex-direction:column; min-height:100%;
  }
  .media{
    position:relative; aspect-ratio:3/2; overflow:hidden; background:#ddd5c8;
  }
  @media (prefers-color-scheme:dark){ .media{ background:#342f27; } }
  .media img{
    display:block; width:100%; height:100%; object-fit:cover;
  }
  .media.missing img{ opacity:0; }
  .badge{
    position:absolute; inset:0; display:grid; place-items:center;
    font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--ink-light);
  }
  .card.ready .badge{ display:none; }
  .body{ padding:12px 14px 14px; display:flex; flex-direction:column; gap:6px; flex:1; }
  .figure{
    font-family:var(--mono); font-size:9px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--ink-light);
  }
  .body h2{
    margin:0; font-size:.98rem; font-weight:500; line-height:1.35;
  }
  .body code{
    font-family:var(--mono); font-size:10px; color:var(--ink-light); word-break:break-all;
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <b>Internal</b>
      <h1>Story scene gallery</h1>
    </div>
    <a class="back" href="../">← Timeline</a>
  </header>

  <div class="toolbar">
    <div class="stats" id="galleryStats">Loading…</div>
    <input class="search" id="gallerySearch" type="search" placeholder="Search title, slug, tag…" autocomplete="off">
    <div class="chips" id="galleryChips"></div>
  </div>

  <div class="grid" id="galleryGrid"></div>
</div>
<script src="gallery.js" defer></script>
</body>
</html>
